version: 1
riskTiers:
  low:
    scoreRange: [0, 29]
    requiredControls: [unit_tests, lint, dependency_scan]
  medium:
    scoreRange: [30, 69]
    requiredControls: [unit_tests, integration_tests, contract_tests, dependency_scan]
  high:
    scoreRange: [70, 89]
    requiredControls: [unit_tests, integration_tests, contract_tests, security_scan, performance_smoke, authz_negative_tests]
  critical:
    scoreRange: [90, 100]
    requiredControls: [unit_tests, integration_tests, contract_tests, security_scan, performance_smoke, authz_negative_tests, resilience]
controlMappings:
  security_scan:
    aliases: [dast, dast_scan, dast_zap]

factors:
  change_size:
    low: 5
    medium: 15
    high: 25
  service_criticality:
    internal: 10
    customer_facing: 25
    regulated_or_payments: 35
  incident_history:
    none_recent: 0
    sev2_recent: 15
    sev1_recent: 30
