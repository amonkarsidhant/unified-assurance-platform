version: 1
policy: quality-evidence-matrix

artifacts:
  unit_tests:
    source: ci
    mandatory_for: [low, medium, high, critical]
  integration_tests:
    source: ci
    mandatory_for: [medium, high, critical]
  contract_tests:
    source: ci
    mandatory_for: [high, critical]
  smoke_tests:
    source: ci
    mandatory_for: [critical]
  lint:
    source: ci
    mandatory_for: [low, medium, high, critical]
  security_scan:
    source: ci
    mandatory_for: [high, critical]
  resilience_scorecard:
    source: artifacts/latest/resilience-scorecard.json
    mandatory_for: [high, critical]
  promotion_decision:
    source: artifacts/latest/promotion-decision.json
    mandatory_for: [medium, high, critical]

validation:
  fail_on_missing_artifact: true
  fail_on_unreadable_artifact: true

risk_tier_profiles:
  R0:
    required_rows: [happy_path]
  R1:
    required_rows: [happy_path, negative_path]
  R2:
    required_rows: [happy_path, negative_path, impacted_regression]
  R3:
    required_rows: [happy_path, negative_path, impacted_regression, rollback_verification]
  R4:
    required_rows: [happy_path, negative_path, impacted_regression, rollback_verification]
    require_cross_role_signoff: true

reporting:
  output:
    - artifacts/latest/release-report.md
    - artifacts/latest/promotion-decision.json
