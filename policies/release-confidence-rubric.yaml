version: 1
policy: release-confidence-rubric

bands:
  no_go:
    score_range: [0, 59]
    action: block_release
  conditional:
    score_range: [60, 79]
    action: require_exception_approval
  go:
    score_range: [80, 100]
    action: allow_release

weights:
  test_evidence: 35
  reliability_signals: 25
  security_signals: 20
  operational_readiness: 20

minimums:
  required_for_go:
    test_evidence: 25
    reliability_signals: 15
    security_signals: 12
    operational_readiness: 12

outputs:
  include: [total_score, category_scores, decision_band, rationale, approver, timestamp]
