---
name: ci-release-gate

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target-environment:
        description: Promotion target
        required: true
        default: stage
        type: choice
        options: [dev, stage, prod]

permissions:
  contents: read

concurrency:
  group: ci-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assurance:
    uses: ./.github/workflows/reusable-assurance.yml
    with:
      assurance-mode: real
      run-real: true
      upload-artifacts: true
      enforce-promotion: true
      promotion-environment: ${{ inputs.target-environment || 'stage' }}
      artifact-suffix: ${{ format('release-{0}', inputs.target-environment || 'stage') }}

  promotion-gate:
    name: promotion-gate
    runs-on: ubuntu-latest
    needs: [assurance]
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: assurance-${{ format('release-{0}', inputs.target-environment || 'stage') }}
          path: artifacts/latest
      - name: Run promotion gate scripts
        uses: ./.github/actions/run-promotion-gate
        with:
          artifacts-dir: artifacts/latest
          config-dir: config
          environment: ${{ inputs.target-environment || 'stage' }}

      - name: Publish release gate summary
        run: |
          {
            echo "## Release gate checks"
            echo
            echo "- Strictness: blocking (promotion enforced)"
            echo "- Artifact: assurance-${{ format('release-{0}', inputs.target-environment || 'stage') }}"
            echo "- Promotion environment: ${{ inputs.target-environment || 'stage' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  evidence-bundle:
    name: evidence-bundle-and-sign
    runs-on: ubuntu-latest
    needs: [promotion-gate]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: assurance-${{ format('release-{0}', inputs.target-environment || 'stage') }}
          path: artifacts/latest
      - name: Create immutable evidence bundle
        run: |
          python3 scripts/create-evidence-bundle.py --source artifacts/latest --out-dir evidence/bundles
      - name: Attempt cosign signature
        run: |
          latest_bundle=$(ls -1 evidence/bundles/*.tar.gz | tail -n1)
          scripts/sign-evidence-bundle.sh "$latest_bundle"
      - name: Upload evidence bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ format('release-{0}', inputs.target-environment || 'stage') }}
          path: |
            evidence/bundles/*.tar.gz
            evidence/bundles/*.sha256
            evidence/bundles/*.manifest.txt
            evidence/bundles/*.sig
            evidence/bundles/*.cert
            evidence/bundles/*.sig.skip.txt
      - name: Publish evidence summary
        run: |
          {
            echo "## Evidence bundle"
            echo
            echo "- Artifact: evidence-${{ format('release-{0}', inputs.target-environment || 'stage') }}"
            echo "- Source artifact: assurance-${{ format('release-{0}', inputs.target-environment || 'stage') }}"
          } >> "$GITHUB_STEP_SUMMARY"
