name: ci-pr-quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance-guardrails:
    name: governance-guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate governance artifacts and PR body contract
        run: python3 scripts/validate-governance-artifacts.py --event-path "$GITHUB_EVENT_PATH"

  assurance:
    needs: [governance-guardrails]
    uses: ./.github/workflows/reusable-assurance.yml
    with:
      assurance-mode: pragmatic
      run-real: false
      upload-artifacts: true
      enforce-promotion: false
      promotion-environment: stage
      artifact-suffix: pr-pragmatic

  pr-feedback:
    name: pr-feedback
    runs-on: ubuntu-latest
    needs: [assurance]
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download assurance artifacts
        uses: actions/download-artifact@v4
        with:
          name: assurance-pr-pragmatic
          path: artifacts/latest
      - name: Render PR comment body
        run: |
          python3 scripts/render-pr-comment.py \
            --results artifacts/latest/results.json \
            --promotion artifacts/latest/promotion-decision.json \
            --flaky artifacts/latest/flaky-policy.json \
            --output artifacts/latest/pr-comment.md
      - name: Upload PR comment preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: comment-pr-pragmatic
          path: artifacts/latest/pr-comment.md
      - name: Publish PR feedback summary
        run: |
          {
            echo "## PR quality checks"
            echo
            echo "- Strictness: non-blocking promotion check (fast feedback)"
            echo "- Input artifact: assurance-pr-pragmatic"
            echo "- Comment artifact: comment-pr-pragmatic"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Comment on PR (best effort)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('artifacts/latest/pr-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
