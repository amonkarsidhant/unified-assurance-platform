name: reusable-assurance

on:
  workflow_call:
    inputs:
      assurance-mode:
        required: false
        type: string
        default: pragmatic
      run-real:
        required: false
        type: boolean
        default: false
      upload-artifacts:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate
        run: make validate

  tooling-check:
    name: tooling-check
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - name: Run tooling check
        run: make tooling-check

  run-assurance:
    name: run-assurance
    runs-on: ubuntu-latest
    needs: [tooling-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install required CI tools
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            GITLEAKS_VERSION="8.30.0"
            ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
            BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

            curl -fsSLO "${BASE_URL}/${ARCHIVE}"
            curl -fsSLO "${BASE_URL}/${CHECKSUMS}"

            expected_checksum=$(grep "  ${ARCHIVE}$" "${CHECKSUMS}" | awk '{print $1}')
            if [ -z "${expected_checksum}" ]; then
              echo "Failed to resolve expected checksum for ${ARCHIVE}" >&2
              exit 1
            fi

            actual_checksum=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
            if [ "${actual_checksum}" != "${expected_checksum}" ]; then
              echo "Checksum verification failed for ${ARCHIVE}" >&2
              echo "expected=${expected_checksum}" >&2
              echo "actual=${actual_checksum}" >&2
              exit 1
            fi

            tar -xzf "${ARCHIVE}" gitleaks
            sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks version
      - name: Run assurance (pragmatic)
        run: make run-assurance
      - name: Generate report
        run: make report
      - name: Validate exceptions
        run: make validate-exceptions ENV=stage
      - name: Evaluate flaky test policy
        run: make evaluate-flaky
      - name: Evaluate promotion policy (stage)
        run: make promotion-check ENV=stage
      - name: Normalize results (results.v2)
        run: make normalize-results-v2
      - name: Render PR comment preview
        run: make render-pr-comment
      - name: Upload assurance artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-pragmatic
          path: |
            artifacts/latest/results.json
            artifacts/latest/release-report.md
            artifacts/latest/*.status
            artifacts/latest/*.log
            artifacts/latest/*.json

  run-assurance-real:
    name: run-assurance-real
    runs-on: ubuntu-latest
    needs: [tooling-check]
    if: ${{ inputs.run-real }}
    steps:
      - uses: actions/checkout@v4
      - name: Install required CI tools
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            GITLEAKS_VERSION="8.30.0"
            ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
            BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

            curl -fsSLO "${BASE_URL}/${ARCHIVE}"
            curl -fsSLO "${BASE_URL}/${CHECKSUMS}"

            expected_checksum=$(grep "  ${ARCHIVE}$" "${CHECKSUMS}" | awk '{print $1}')
            if [ -z "${expected_checksum}" ]; then
              echo "Failed to resolve expected checksum for ${ARCHIVE}" >&2
              exit 1
            fi

            actual_checksum=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
            if [ "${actual_checksum}" != "${expected_checksum}" ]; then
              echo "Checksum verification failed for ${ARCHIVE}" >&2
              echo "expected=${expected_checksum}" >&2
              echo "actual=${actual_checksum}" >&2
              exit 1
            fi

            tar -xzf "${ARCHIVE}" gitleaks
            sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks version
      - name: Run assurance (real)
        run: make run-assurance-real
      - name: Generate report
        run: make report
      - name: Validate exceptions
        run: make validate-exceptions ENV=stage
      - name: Evaluate flaky test policy
        run: make evaluate-flaky
      - name: Evaluate promotion policy (stage)
        run: make promotion-check ENV=stage
      - name: Normalize results (results.v2)
        run: make normalize-results-v2
      - name: Render PR comment preview
        run: make render-pr-comment
      - name: Upload assurance artifacts (real)
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-real
          path: |
            artifacts/latest/results.json
            artifacts/latest/release-report.md
            artifacts/latest/*.status
            artifacts/latest/*.log
            artifacts/latest/*.json
