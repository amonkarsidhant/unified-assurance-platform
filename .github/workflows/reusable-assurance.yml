name: reusable-assurance

on:
  workflow_call:
    inputs:
      assurance-mode:
        required: false
        type: string
        default: pragmatic
      run-real:
        required: false
        type: boolean
        default: false
      upload-artifacts:
        required: false
        type: boolean
        default: true
      enforce-promotion:
        required: false
        type: boolean
        default: true
      promotion-environment:
        required: false
        type: string
        default: stage
      artifact-suffix:
        required: false
        type: string
        default: shared-pragmatic
      event-path:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  quality-hygiene:
    name: quality-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
      - name: Install lint tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
      - name: Run quality lint suite
        run: make lint

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: [quality-hygiene]
    steps:
      - uses: actions/checkout@v4
      - name: Run validate
        run: make validate
      - name: Validate governance artifacts
        if: inputs.event-path != ''
        run: make governance-artifacts-check EVENT_PATH=${{ inputs.event-path }}

  tooling-check:
    name: tooling-check
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - name: Run tooling check
        run: make tooling-check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: [tooling-check]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
      - name: Install dependencies
        run: npm install
      - name: Run typecheck
        run: make typecheck

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [tooling-check]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
      - name: Install dependencies
        run: npm install
      - name: Run coverage
        run: make coverage || true
      - name: Check coverage threshold
        run: make coverage-check || true

  run-assurance:
    name: run-assurance
    runs-on: ubuntu-latest
    needs: [tooling-check, typecheck, coverage]
    steps:
      - uses: actions/checkout@v4
      - name: Install required CI tools
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            GITLEAKS_VERSION="8.30.0"
            ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
            BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

            curl -fsSLO "${BASE_URL}/${ARCHIVE}"
            curl -fsSLO "${BASE_URL}/${CHECKSUMS}"

            expected_checksum=$(grep "  ${ARCHIVE}$" "${CHECKSUMS}" | awk '{print $1}')
            if [ -z "${expected_checksum}" ]; then
              echo "Failed to resolve expected checksum for ${ARCHIVE}" >&2
              exit 1
            fi

            actual_checksum=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
            if [ "${actual_checksum}" != "${expected_checksum}" ]; then
              echo "Checksum verification failed for ${ARCHIVE}" >&2
              echo "expected=${expected_checksum}" >&2
              echo "actual=${actual_checksum}" >&2
              exit 1
            fi

            tar -xzf "${ARCHIVE}" gitleaks
            sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks version
      - name: Run assurance (pragmatic)
        run: make run-assurance
      - name: Generate report
        run: make report
      - name: Validate exceptions
        run: make validate-exceptions ENV=${{ inputs.promotion-environment }}
      - name: Evaluate flaky test policy
        run: make evaluate-flaky
      - name: Evaluate promotion policy (${{ inputs.promotion-environment }})
        continue-on-error: ${{ !inputs.enforce-promotion }}
        run: make promotion-check ENV=${{ inputs.promotion-environment }}
      - name: Normalize results (results.v2)
        run: make normalize-results-v2
      - name: Render PR comment preview
        run: make render-pr-comment
      - name: Build run summary (pragmatic)
        run: |
          artifact_name="assurance-${{ inputs.artifact-suffix }}"
          {
            echo "## Assurance run summary"
            echo
            echo "- Mode: pragmatic"
            echo "- Promotion environment: ${{ inputs.promotion-environment }}"
            echo "- Enforce promotion gate: ${{ inputs.enforce-promotion }}"
            echo "- Artifact: ${artifact_name}"
            echo
            echo "### Included files"
            echo "- artifacts/latest/results.json"
            echo "- artifacts/latest/results.v2.json"
            echo "- artifacts/latest/release-report.md"
            echo "- artifacts/latest/promotion-decision.json"
            echo "- artifacts/latest/flaky-policy.json"
            echo "- artifacts/latest/pr-comment.md"
          } | tee artifacts/latest/ci-summary-${{ inputs.artifact-suffix }}.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload assurance artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-${{ inputs.artifact-suffix }}
          path: |
            artifacts/latest/results.json
            artifacts/latest/release-report.md
            artifacts/latest/*.status
            artifacts/latest/*.log
            artifacts/latest/*.json
            artifacts/latest/ci-summary-${{ inputs.artifact-suffix }}.md

  run-assurance-real:
    name: run-assurance-real
    runs-on: ubuntu-latest
    needs: [tooling-check]
    if: ${{ inputs.run-real }}
    steps:
      - uses: actions/checkout@v4
      - name: Install required CI tools
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            GITLEAKS_VERSION="8.30.0"
            ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
            CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
            BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

            curl -fsSLO "${BASE_URL}/${ARCHIVE}"
            curl -fsSLO "${BASE_URL}/${CHECKSUMS}"

            expected_checksum=$(grep "  ${ARCHIVE}$" "${CHECKSUMS}" | awk '{print $1}')
            if [ -z "${expected_checksum}" ]; then
              echo "Failed to resolve expected checksum for ${ARCHIVE}" >&2
              exit 1
            fi

            actual_checksum=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
            if [ "${actual_checksum}" != "${expected_checksum}" ]; then
              echo "Checksum verification failed for ${ARCHIVE}" >&2
              echo "expected=${expected_checksum}" >&2
              echo "actual=${actual_checksum}" >&2
              exit 1
            fi

            tar -xzf "${ARCHIVE}" gitleaks
            sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks version
      - name: Run assurance (real)
        run: make run-assurance-real
      - name: Generate report
        run: make report
      - name: Validate exceptions
        run: make validate-exceptions ENV=${{ inputs.promotion-environment }}
      - name: Evaluate flaky test policy
        run: make evaluate-flaky
      - name: Evaluate promotion policy (${{ inputs.promotion-environment }})
        continue-on-error: ${{ !inputs.enforce-promotion }}
        run: make promotion-check ENV=${{ inputs.promotion-environment }}
      - name: Normalize results (results.v2)
        run: make normalize-results-v2
      - name: Render PR comment preview
        run: make render-pr-comment
      - name: Build run summary (real)
        run: |
          artifact_name="assurance-${{ inputs.artifact-suffix }}"
          {
            echo "## Assurance run summary"
            echo
            echo "- Mode: real"
            echo "- Promotion environment: ${{ inputs.promotion-environment }}"
            echo "- Enforce promotion gate: ${{ inputs.enforce-promotion }}"
            echo "- Artifact: ${artifact_name}"
            echo
            echo "### Included files"
            echo "- artifacts/latest/results.json"
            echo "- artifacts/latest/results.v2.json"
            echo "- artifacts/latest/release-report.md"
            echo "- artifacts/latest/promotion-decision.json"
            echo "- artifacts/latest/flaky-policy.json"
            echo "- artifacts/latest/pr-comment.md"
          } | tee artifacts/latest/ci-summary-${{ inputs.artifact-suffix }}.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload assurance artifacts (real)
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: assurance-${{ inputs.artifact-suffix }}
          path: |
            artifacts/latest/results.json
            artifacts/latest/release-report.md
            artifacts/latest/*.status
            artifacts/latest/*.log
            artifacts/latest/*.json
            artifacts/latest/ci-summary-${{ inputs.artifact-suffix }}.md
