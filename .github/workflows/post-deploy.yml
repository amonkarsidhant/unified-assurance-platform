name: post-deploy-checks

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target-environment:
        description: Deployed environment
        required: true
        default: prod
        type: choice
        options: [dev, stage, prod]

permissions:
  contents: read

jobs:
  post-deploy-assurance:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success' }}
    uses: ./.github/workflows/reusable-assurance.yml
    with:
      assurance-mode: real
      run-real: true
      upload-artifacts: true

  post-deploy-promotion-evidence:
    name: post-deploy-gate-and-evidence
    runs-on: ubuntu-latest
    needs: [post-deploy-assurance]
    steps:
      - uses: actions/checkout@v4
      - name: Download real artifacts
        uses: actions/download-artifact@v4
        with:
          name: assurance-real
          path: artifacts/latest
      - name: Validate exceptions + evaluate deployment gate
        run: |
          tier=$(python3 -c 'import json;print(json.load(open("artifacts/latest/results.json")).get("risk_context",{}).get("risk_tier","low"))')
          service=$(python3 -c 'import json;print(json.load(open("artifacts/latest/results.json")).get("service","sample-service"))')
          python3 scripts/validate-exceptions.py \
            --exceptions-dir config/exceptions \
            --service "$service" \
            --environment "${{ inputs.target-environment || 'prod' }}" \
            --tier "$tier"
          python3 scripts/evaluate-flaky-policy.py --policy config/flaky-policy.json --results artifacts/latest/results.json --output artifacts/latest/flaky-policy.json
          python3 scripts/evaluate-promotion.py \
            --environment "${{ inputs.target-environment || 'prod' }}" \
            --results artifacts/latest/results.json \
            --exceptions-dir config/exceptions \
            --flaky-result artifacts/latest/flaky-policy.json
          python3 scripts/normalize-results-v2.py --input artifacts/latest/results.json --output artifacts/latest/results.v2.json --exceptions artifacts/latest/exceptions-audit.json --promotion artifacts/latest/promotion-decision.json --flaky artifacts/latest/flaky-policy.json
          python3 scripts/render-pr-comment.py --results artifacts/latest/results.json --promotion artifacts/latest/promotion-decision.json --flaky artifacts/latest/flaky-policy.json --output artifacts/latest/pr-comment.md
      - name: Create and sign evidence bundle
        run: |
          python3 scripts/create-evidence-bundle.py --source artifacts/latest --out-dir evidence/bundles
          latest_bundle=$(ls -1 evidence/bundles/*.tar.gz | tail -n1)
          scripts/sign-evidence-bundle.sh "$latest_bundle"
      - name: Upload post-deploy evidence
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-evidence
          path: |
            evidence/bundles/*
