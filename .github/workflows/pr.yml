name: pr-assurance

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-assurance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  assurance:
    uses: ./.github/workflows/reusable-assurance.yml
    with:
      assurance-mode: pragmatic
      run-real: false
      upload-artifacts: true

  pr-feedback:
    name: pr-feedback
    runs-on: ubuntu-latest
    needs: [assurance]
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download assurance artifacts
        uses: actions/download-artifact@v4
        with:
          name: assurance-pragmatic
          path: artifacts/latest
      - name: Render PR comment body
        run: |
          python3 scripts/render-pr-comment.py \
            --results artifacts/latest/results.json \
            --promotion artifacts/latest/promotion-decision.json \
            --flaky artifacts/latest/flaky-policy.json \
            --output artifacts/latest/pr-comment.md
      - name: Upload PR comment preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-preview
          path: artifacts/latest/pr-comment.md
      - name: Comment on PR (best effort)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('artifacts/latest/pr-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
