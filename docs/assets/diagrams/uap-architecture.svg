<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">UAP architecture overview</title>
  <desc id="desc">High-level architecture for Unified Assurance Platform with operators, control plane, execution workers, policy config, artifacts, and observability.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .title { fill: #0f172a; font: 700 24px Inter, Arial, sans-serif; }
      .label { fill: #0f172a; font: 600 18px Inter, Arial, sans-serif; }
      .text { fill: #334155; font: 500 14px Inter, Arial, sans-serif; }
      .line { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow2); stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#1d4ed8" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700" />
  <text class="title" x="60" y="56">Unified Assurance Platform — Architecture</text>

  <rect class="card" x="60" y="110" width="220" height="120" />
  <text class="label" x="90" y="155">Operators</text>
  <text class="text" x="90" y="182">Release Manager</text>
  <text class="text" x="90" y="204">Platform Engineer</text>

  <rect class="card" x="360" y="90" width="300" height="160" />
  <text class="label" x="390" y="135">Control Plane</text>
  <text class="text" x="390" y="165">UI + API orchestration</text>
  <text class="text" x="390" y="187">Run history + policy checks</text>
  <text class="text" x="390" y="209">Promotion decision surface</text>

  <rect class="card" x="760" y="90" width="340" height="160" />
  <text class="label" x="790" y="135">Execution Workers</text>
  <text class="text" x="790" y="165">Assurance runner</text>
  <text class="text" x="790" y="187">Resilience intelligence runner</text>
  <text class="text" x="790" y="209">Incident diagnostics runner</text>

  <rect class="card" x="120" y="320" width="280" height="170" />
  <text class="label" x="150" y="365">Policy + Config</text>
  <text class="text" x="150" y="395">tiers/*, quality gates</text>
  <text class="text" x="150" y="417">exceptions, flaky policy</text>
  <text class="text" x="150" y="439">scenario templates</text>

  <rect class="card" x="460" y="320" width="280" height="170" />
  <text class="label" x="490" y="365">Artifacts + Evidence</text>
  <text class="text" x="490" y="395">results.json / results.v2</text>
  <text class="text" x="490" y="417">promotion-decision.json</text>
  <text class="text" x="490" y="439">release reports + attestations</text>

  <rect class="card" x="800" y="320" width="280" height="170" />
  <text class="label" x="830" y="365">Observability</text>
  <text class="text" x="830" y="395">Prometheus metrics</text>
  <text class="text" x="830" y="417">Grafana dashboards</text>
  <text class="text" x="830" y="439">Audit-ready summaries</text>

  <path class="line" d="M280 170 L360 170" />
  <path class="line" d="M660 170 L760 170" />
  <path class="line" d="M910 250 L910 320" />
  <path class="line" d="M760 410 L740 410" />
  <path class="line" d="M400 410 L460 410" />
  <path class="line2" d="M520 250 L260 320" />
  <path class="line2" d="M980 250 L660 320" />

  <text class="text" x="70" y="645">Status semantics: GO = green • CONDITIONAL = amber • NO-GO = red</text>
</svg>
