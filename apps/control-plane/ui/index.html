<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAP Control Plane - Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>UAP Control Plane</h1>
        <p class="muted">Trigger assurance workflows and inspect recent execution state.</p>
      </header>

      <div id="banner" class="banner hidden" role="status" aria-live="polite"></div>

      <section class="panel">
        <h2>Trigger Runs</h2>
        <div class="row wrap">
          <button id="assuranceBtn">Trigger Assurance</button>
          <button id="resilienceBtn">Trigger Resilience</button>
        </div>
        <div class="row wrap">
          <label for="incidentPath" class="sr-only">Incident payload path</label>
          <input id="incidentPath" value="examples/incidents/sample-incident.json" />
          <button id="incidentBtn">Trigger Incident</button>
        </div>
      </section>

      <section class="panel">
        <h2>Last API Response</h2>
        <pre id="result">No requests yet.</pre>
      </section>

      <nav>
        <a href="./runs.html">View Runs</a>
      </nav>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
