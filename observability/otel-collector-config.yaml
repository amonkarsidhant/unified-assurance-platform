receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  resource:
    attributes:
      - key: service.namespace
        value: unified-assurance
        action: upsert

exporters:
  logging:
    loglevel: info
  otlp:
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [logging, otlp]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [logging, otlp]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [logging, otlp]
