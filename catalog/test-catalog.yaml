version: 1
categories:
  static:
    tests: [lint, typecheck, config_validation]
  functional:
    tests: [unit, integration, contract, e2e_smoke]
  non_functional:
    tests: [performance_smoke, accessibility, resilience_smoke, chaos_resilience]
  security:
    tests: [sast, dependency_scan, secret_scan, auth_negative]
  data_and_events:
    tests: [schema_compatibility, replay_idempotency, dlq_validation]

layer_specific:
  load_balancer:
    tests: [route_validation, healthcheck_failover, tls_policy_check, lb_error_rate_smoke]
  api:
    tests: [api_contract, authz_authn_negative, timeout_budget, latency_p95_smoke]
  database:
    tests: [migration_forward_backward, replica_lag_threshold, backup_restore_verify, query_regression_smoke]
  vm_infra:
    tests: [image_hardening, config_drift_scan, node_replacement, capacity_smoke]
  resilience:
    tests: [db_replica_lag_injection, api_timeout_injection, vm_node_loss_injection, lb_misroute_injection, queue_backlog_injection, chaos_network_latency, chaos_dependency_timeout, chaos_process_kill, chaos_resource_stress]
  security_layer:
    tests: [least_privilege_review, network_policy_validation, secret_rotation_check]
  observability:
    tests: [trace_propagation, log_completeness, golden_signals_dashboard_check, alert_actionability]

outputs:
  preferredFormats: [json, junit, sarif, markdown]
