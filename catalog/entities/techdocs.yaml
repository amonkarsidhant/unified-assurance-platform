# Backstage TechDocs Configuration
# https://backstage.io/docs/features/techdocs/
---
site:
  name: Unified Assurance Platform
  description: Technical documentation for UAP
  visibility: internal

publisher:
  type: repository
  branches:
    - main
  includedPaths:
    - docs/**
    - README.md
    - SECURITY.md

generator:
  type: local
  runIn: local
  dockerImage: spotify/techdocs-core

mkdocs:
  name: material
  plugins:
    - techdocs-core
    - search:
        separator: '[\s\-\.]+'
  markdown_extensions:
    - markdown.extensions.admonition
    - markdown.extensions.codehilite:
        guessLang: false
    - markdown.extensions.toc:
        permalink: true
  nav:
    - Home: index.md
    - Architecture:
        - Overview: architecture/overview.md
        - Guardrails: architecture/guardrail-checklist.md
        - Platform Architecture: architecture/platform-architecture.md
    - SRE:
        - Reliability Playbook: sre/uap-reliability-playbook.md
    - Guides:
        - QE Primer: guides/qe-primer.md
        - Phase 2 Controls: guides/phase2-enterprise-assurance-controls.md
    - Reference:
        - OpenAPI: reference/openapi.md
