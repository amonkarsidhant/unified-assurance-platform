# Backstage Software Catalog Entity Definitions
# https://backstage.io/docs/features/software-catalog/
#
# Use: Separate entities with --- document separator
#
# Phase 2 Updates (Issues #58, #59, #67, #68):
# - SRE: Grafana/Prometheus dashboard links, SLO status, on-call widgets
# - SRE: PagerDuty/OpsGenie on-call and runbook integration
# - Architect: Governance guardrail compliance widget
#
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: uap-control-plane
  description: Unified Assurance Platform Control Plane API
  tags:
    - assurance
    - control-plane
    - api
  annotations:
    backstage.io/techdocs-ref: dir:docs/architecture
    # Issue #58: Grafana/Prometheus dashboards & SLOs
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    grafana/dashboard-selector: "UAP Control Plane"
    grafana/link: "https://grafana.example.com/d/uap-control-plane"
    # Issue #68: Governance guardrail status
    uap/guardrail-status: "https://governance.example.com/status/uap-control-plane"
    # Issue #67: Runbook links
    backstage.io/illuminated-doc: "docs/runbooks/control-plane-runbook.md"
    jira/component: "control-plane"
spec:
  type: service
  lifecycle: production
  owner: architect
  providesApis:
    - uap-assurance-api
    - uap-policy-api
  consumesApis:
    - uap-connector-events
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: uap-policy-engine
  description: Policy evaluation engine with explainable advisory and hard gates
  tags:
    - policy
    - governance
    - evaluation
  annotations:
    backstage.io/techdocs-ref: dir:docs/architecture
    # Issue #58: Grafana/Prometheus dashboards & SLOs
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
    grafana/dashboard-selector: "UAP Policy Engine"
    grafana/link: "https://grafana.example.com/d/uap-policy-engine"
    # Issue #68: Governance guardrail status
    uap/guardrail-status: "https://governance.example.com/status/uap-policy-engine"
    # Issue #67: Runbook links
    backstage.io/illuminated-doc: "docs/runbooks/policy-engine-runbook.md"
    jira/component: "policy-engine"
spec:
  type: service
  lifecycle: production
  owner: architect
  providesApis:
    - uap-policy-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: uap-connectors
  description: Pluggable connectors for third-party integrations (GitHub Actions, JUnit, etc.)
  tags:
    - connectors
    - plugin
    - integration
  annotations:
    backstage.io/techdocs-ref: dir:docs/architecture
    # Issue #58: Grafana/Prometheus dashboards & SLOs
    prometheus.io/scrape: "true"
    prometheus.io/port: "9092"
    grafana/dashboard-selector: "UAP Connectors"
    grafana/link: "https://grafana.example.com/d/uap-connectors"
    # Issue #68: Governance guardrail status
    uap/guardrail-status: "https://governance.example.com/status/uap-connectors"
    # Issue #67: Runbook links
    backstage.io/illuminated-doc: "docs/runbooks/connectors-runbook.md"
    jira/component: "connectors"
spec:
  type: library
  lifecycle: production
  owner: architect
  providesApis:
    - uap-connector-events
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: uap-assurance-system
  description: UAP Assurance System - core services and APIs
  tags:
    - assurance
    - system
spec:
  owner: architect
  domain: uap-assurance
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: uap-assurance-api
  description: Core assurance API for ingestion and query
  tags:
    - assurance
    - api
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: architect
  system: uap-assurance-system
  definition:
    $openapi: ./openapi/assurance-api.yaml
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: uap-policy-api
  description: Policy evaluation and governance API
  tags:
    - policy
    - api
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: architect
  system: uap-assurance-system
  definition:
    $openapi: ./openapi/policy-api.yaml
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: uap-connector-events
  description: Event ingestion API for connector plugins
  tags:
    - events
    - api
    - webhook
spec:
  type: openapi
  lifecycle: production
  owner: architect
  system: uap-assurance-system
  definition:
    $openapi: ./openapi/connector-events.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: uap-core-team
  description: Core team responsible for UAP development
  annotations:
    # Issue #59: PagerDuty/OpsGenie on-call integration
    pagerduty.com/service-id: "P123456"
    opsgenie.com/team: "uap-core"
spec:
  type: team
  memberOf: engineering
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: uap-prometheus
  description: Prometheus instance for UAP metrics
  tags:
    - monitoring
    - prometheus
spec:
  type: monitoring
  owner: sre
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: uap-grafana
  description: Grafana instance for UAP dashboards
  tags:
    - monitoring
    - grafana
spec:
  type: monitoring
  owner: sre
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: uap-kubernetes
  description: Kubernetes cluster hosting UAP services
  tags:
    - infrastructure
    - kubernetes
spec:
  type: infrastructure
  owner: sre
