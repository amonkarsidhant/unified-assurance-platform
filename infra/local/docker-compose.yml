name: uap-local-observability

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: uap-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - node-exporter

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: uap-node-exporter
    command:
      - --collector.disable-defaults
      - --collector.textfile
      - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
    volumes:
      - ../../artifacts/metrics:/var/lib/node_exporter/textfile_collector:ro
    ports:
      - "9100:9100"

  loki:
    image: grafana/loki:2.9.10
    container_name: uap-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: uap-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    container_name: uap-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8889:8889"
      - "13133:13133"
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:11.2.0
    container_name: uap-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
